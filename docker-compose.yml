version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: itlive_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-itlive_verify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itlive_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itlive_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-itlive_verify}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BASE_URL: ${BASE_URL:-https://verify.itlive.uz}
      FRONTEND_URL: ${FRONTEND_URL:-https://verify.itlive.uz}
      NODE_ENV: production
      PORT: 4000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - itlive_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-https://verify.itlive.uz/api}
    container_name: itlive_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://verify.itlive.uz/api}
    networks:
      - itlive_network

  nginx:
    image: nginx:alpine
    container_name: itlive_nginx
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - itlive_network

  certbot:
    image: certbot/certbot
    container_name: itlive_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email your@email.com -d verify.itlive.uz --agree-tos --no-eff-email

networks:
  itlive_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_conf:
